<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="#0a0a0a"/>
  
  <!-- Barbell icon centered -->
  <g transform="translate(256, 276)">
    <!-- Center bar -->
    <rect x="-140" y="-20" width="280" height="40" rx="10" fill="#404040"/>
    
